<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Контакты — ФБУЗ ЦГИЭ в Мурманской области</title>
<link rel="icon" href="assets/logo.jpg">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=PT+Sans:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/styles.css">
</head>
<body data-page="kontakty">

<div id="site-top"></div>

<div class="page-head"><div class="container">
  <div class="breadcrumb"><a href="index.html">Главная</a> / Контакты</div>
  <h1>Контакты</h1>
</div></div>

<section>
  <div class="container">
    <div class="info-row">
      <div class="info-block">
        <h2>Как с нами связаться</h2>
        <div class="contacts-grid">
          <div class="contact-item"><span class="contact-icon" data-ico="pin"></span><div><strong>Адрес</strong><span data-bind="address"></span></div></div>
          <div class="contact-item"><span class="contact-icon" data-ico="phone"></span><div><strong>Телефон</strong><a data-bind="phone"></a></div></div>
          <div class="contact-item"><span class="contact-icon" data-ico="mail"></span><div><strong>Email</strong><a data-bind="email"></a></div></div>
          <div class="contact-item"><span class="contact-icon" data-ico="fax"></span><div><strong>Факс</strong><span>8 (8152) 47-34-78</span></div></div>
          <div class="contact-item"><span class="contact-icon" data-ico="chat"></span><div><strong>ВКонтакте</strong><a data-bind="vkUrl" target="_blank" rel="noopener">Наше сообщество</a></div></div>
          <div class="contact-item"><span class="contact-icon" data-ico="globe"></span><div><strong>Сайт</strong><span data-bind="siteName"></span></div></div>
        </div>
        <p style="margin-top:22px"><a class="btn-call" data-bind="vkUrl" target="_blank" rel="noopener" style="margin-top:0">Записаться онлайн</a></p>
      </div>
      <div class="info-block">
        <h2>Время работы</h2>
        <div id="work-schedule"></div>
      </div>
    </div>

    <iframe class="map-frame" loading="lazy" title="Карта проезда: г. Мурманск, ул. Коммуны, д. 11"
      src="https://yandex.ru/map-widget/v1/?um=constructor%3Ab6bcbd4f7d419a2c307b027f77b0412e6e00cecc3cf34cc1047ea1ec77e106eb&amp;source=constructor"
      width="100%" height="400" frameborder="0"></iframe>
  </div>
</section>

<section class="services-bg">
  <div class="container">
    <h2 class="section-title">Телефонный справочник</h2>
    <p class="section-subtitle">Телефоны отделов головного офиса (г. Мурманск)</p>
    <div class="struct-wrap" id="phone-directory"></div>
  </div>
</section>

<section class="hotlines-bg" style="padding:40px 0;">
  <div class="container">
    <div class="hotlines-inner">
      <h2>Горячие линии</h2>
      <div class="hl-cards" id="hotlines"></div>
    </div>
  </div>
</section>

<div id="site-bottom"></div>

<script src="assets/content.js"></script>
<script src="assets/app.js"></script>
</body>
</html>
